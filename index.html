<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>v2ray Share Latest</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    .container {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      max-width: 600px;
      width: 100%;
      height: 100vh;
      max-height: 100vh;
      overflow-y: auto;
      margin: auto;
    }

    .container::-webkit-scrollbar {
      width: 8px;
    }

    .container::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .container::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.4);
      border-radius: 10px;
    }

    .container::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.6);
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      color: rgba(26, 32, 44, 0.9);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .header p {
      color: rgba(113, 128, 150, 0.8);
      font-size: 0.95rem;
    }

    .endpoints {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .endpoint {
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(102, 126, 234, 0.5);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s ease;
    }

    .endpoint:hover {
      background: rgba(255, 255, 255, 0.45);
      border-color: rgba(102, 126, 234, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.15);
    }

    .endpoint-header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }

    .endpoint-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-right: 12px;
    }

    .endpoint-info h3 {
      color: rgba(45, 55, 72, 0.9);
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .endpoint-info span {
      color: rgba(113, 128, 150, 0.8);
      font-size: 0.85rem;
    }

    .url-box {
      background: rgb(255, 255, 255);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 12px;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .url-box code {
      color: rgb(36, 41, 46);
      font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
      font-size: 0.85rem;
      word-break: break-all;
      display: block;
    }

    .copy-btn {
      width: 100%;
      background: rgb(255, 255, 255);
      backdrop-filter: blur(5px);
      color: #110d0f;
      border: 1px solid rgba(0, 0, 0, 0.4);
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .copy-btn:hover {
      background: rgb(255, 255, 255);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .copy-btn:active {
      transform: translateY(0);
    }

    @media (max-width: 640px) {
      .container {
        padding: 24px;
        max-height: 95vh;
      }

      .header h1 {
        font-size: 1.5rem;
      }

      .endpoint {
        padding: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>v2ray Share Latest</h1>
      <p>Click to copy your subscription URL</p>
    </div>

    <div class="endpoints">
      <div class="endpoint">
        <div class="endpoint-header">
          <div class="endpoint-icon" style="background: rgba(102, 126, 234, 0.8);">⚡</div>
          <div class="endpoint-info">
            <h3>V2Ray Subscription</h3>
            <span>For V2Ray clients</span>
          </div>
        </div>
        <div class="url-box">
          <code id="v2ray-url"></code>
        </div>
        <button class="copy-btn" onclick="copyUrl('v2ray-url', this)">
          <span>📋 Copy URL</span>
        </button>
      </div>

      <div class="endpoint">
        <div class="endpoint-header">
          <div class="endpoint-icon" style="background: rgba(245, 101, 101, 0.8);">🔮</div>
          <div class="endpoint-info">
            <h3>Clash Subscription</h3>
            <span>For Clash clients</span>
          </div>
        </div>
        <div class="url-box">
          <code id="clash-url"></code>
        </div>
        <button class="copy-btn" onclick="copyUrl('clash-url', this)">
          <span>📋 Copy URL</span>
        </button>
      </div>

      <div class="endpoint">
        <div class="endpoint-header">
          <div class="endpoint-icon" style="background: rgba(72, 187, 120, 0.8);">🌊</div>
          <div class="endpoint-info">
            <h3>Mihomo Subscription</h3>
            <span>For Mihomo (Clash.Meta) clients</span>
          </div>
        </div>
        <div class="url-box">
          <code id="mihomo-url"></code>
        </div>
        <button class="copy-btn" onclick="copyUrl('mihomo-url', this)">
          <span>📋 Copy URL</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    // Get current base URL dynamically
    const baseUrl = window.location.origin;

    // Set URLs dynamically
    document.getElementById('v2ray-url').textContent = `${baseUrl}/api/subscribe/v2ray`;
    document.getElementById('clash-url').textContent = `${baseUrl}/api/subscribe/clash`;
    document.getElementById('mihomo-url').textContent = `${baseUrl}/api/subscribe/mihomo`;

    function copyUrl(elementId, button) {
      const urlElement = document.getElementById(elementId);
      const text = urlElement.textContent;

      navigator.clipboard.writeText(text).then(() => {
        const originalContent = button.innerHTML;
        button.innerHTML = '<span>✅ Copied!</span>';
        button.classList.add('copied');
        setTimeout(() => {
          button.innerHTML = originalContent;
          button.classList.remove('copied');
        }, 2000);
      }).catch(err => {
        console.error('Failed to copy:', err);
        alert('Failed to copy URL. Please try again.');
      });
    }
  </script>
</body>

</html>
